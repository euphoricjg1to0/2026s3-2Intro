<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carol | Landing Page</title>

  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      z-index: 2;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .typing {
      font-size: 1.5rem;
      border-right: 3px solid white;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 4s steps(40, end) forwards, blink 0.7s infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    p {
      margin-top: 20px;
      font-size: 1.2rem;
      max-width: 500px;
    }

    .highlight {
      color: #ffd700;
      font-weight: bold;
    }

    /* Floating circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      animation: float 10s infinite ease-in-out;
    }

    .circle:nth-child(1) {
      width: 80px;
      height: 80px;
      left: 10%;
      top: 80%;
    }

    .circle:nth-child(2) {
      width: 120px;
      height: 120px;
      left: 80%;
      top: 70%;
      animation-delay: 2s;
    }

    .circle:nth-child(3) {
      width: 60px;
      height: 60px;
      left: 50%;
      top: 90%;
      animation-delay: 4s;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-100px); }
      100% { transform: translateY(0); }
    }

    footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <!-- Floating background elements -->
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <!-- Main Content -->
  <div class="container">
    <h1>Hi, I'm Carol 👋</h1>
    <div class="typing">Secondary 3 Student • Mobile Web Applications</div>

    <p>
      I create simple and creative webpages using 
      <span class="highlight">HTML</span> and 
      <span class="highlight">CSS</span>.
    </p>

    <p>
      🚀 My Ignite Challenge: 
      <span class="highlight">"Trash to Trend: You Nailed It!"</span>
    </p>
  </div>

  <footer>
    © 2026 Carol
  </footer>

</body>
</html>
