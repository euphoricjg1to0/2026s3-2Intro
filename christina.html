<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Me</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding-top: 100px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Hi, I'm Christina 👋</h1>
    <p>I am 15 years old.</p>
    <p>I enjoy playing games and love fashion design.</p>
    <p>Nice to meet you!</p>
</div>

</body>
