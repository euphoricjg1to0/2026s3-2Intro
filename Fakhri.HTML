<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fakhri | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease forwards;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      animation: slideDown 1.5s ease;
    }

    p {
      font-size: 1.2rem;
      margin: 10px 0;
      opacity: 0;
      animation: fadeUp 1.5s ease forwards;
    }

    p:nth-child(2) { animation-delay: 0.5s; }
    p:nth-child(3) { animation-delay: 1s; }
    p:nth-child(4) { animation-delay: 1.5s; }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: white;
      color: #2a5298;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      opacity: 0;
      animation: fadeUp 1.5s ease forwards;
      animation-delay: 2s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #ffdd57;
      color: black;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Background floating circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      animation: float 10s infinite ease-in-out;
    }

    .circle:nth-child(1) {
      width: 100px;
      height: 100px;
      top: 10%;
      left: 20%;
    }

    .circle:nth-child(2) {
      width: 150px;
      height: 150px;
      bottom: 15%;
      right: 20%;
      animation-delay: 2s;
    }

    .circle:nth-child(3) {
      width: 80px;
      height: 80px;
      bottom: 30%;
      left: 10%;
      animation-delay: 4s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-30px);
      }
    }
  </style>
</head>

<body>

  <!-- Floating background -->
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <!-- Main content -->
  <div class="container">
    <h1>Hi, I'm Fakhri 👋</h1>
    <p>Secondary 3 Student</p>
    <p>Currently studying Mobile Web Application</p>
    <p>I create simple webpages using HTML & CSS</p>
    <p>Ignite Challenge: <strong>X-Bot Extra</strong></p>

    <button class="btn" onclick="alert('Welcome to my page!')">
      Explore
    </button>
  </div>

</body>
</html>
