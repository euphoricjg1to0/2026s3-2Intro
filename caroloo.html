<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carol | Landing Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    /* Floating circles animation */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      animation: float 10s infinite ease-in-out;
    }

    .circle:nth-child(1) {
      width: 120px;
      height: 120px;
      top: 10%;
      left: 20%;
    }

    .circle:nth-child(2) {
      width: 80px;
      height: 80px;
      top: 70%;
      left: 60%;
      animation-duration: 8s;
    }

    .circle:nth-child(3) {
      width: 150px;
      height: 150px;
      top: 40%;
      left: 80%;
      animation-duration: 12s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-40px); }
    }

    /* Main content */
    .container {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      animation: fadeIn 2s ease forwards;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      animation: slideDown 1.5s ease;
    }

    p {
      font-size: 1.2em;
      max-width: 600px;
      margin-bottom: 20px;
      animation: fadeIn 3s ease;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #764ba2;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #eee;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

  </style>
</head>
<body>

  <!-- Animated circles -->
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <!-- Content -->
  <div class="container">
    <h1>Hi, I'm Carol 👋</h1>
    <p>
      I am a Secondary 3 student currently studying Mobile Web Applications.
      I create simple webpages using HTML and CSS.
    </p>
    <p>
      My Ignite Challenge: <strong>Trash to Trend — You Nailed It!</strong>
    </p>
    <button class="btn">Explore More</button>
  </div>

</body>
</html>
