<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daanya Landing Page</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial,Helvetica,sans-serif;
  min-height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
  color:white;
}
.hero{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  min-height:100vh;
  padding:20px;
  position:relative;
}
.card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  padding:40px;
  border-radius:24px;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
  animation:float 4s ease-in-out infinite;
  max-width:700px;
}
h1{font-size:3rem;margin-bottom:10px;animation:slideDown 1s ease}
h2{font-size:1.3rem;color:#bfdbfe;margin-bottom:18px}
p{font-size:1.05rem;line-height:1.7;margin-bottom:12px}
.tag{
  margin-top:18px;
  display:inline-block;
  padding:12px 20px;
  border-radius:999px;
  background:#facc15;
  color:#111827;
  font-weight:bold;
  animation:pulse 2s infinite;
}
.circle{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  animation:move 12s linear infinite;
}
.c1{width:120px;height:120px;top:10%;left:10%}
.c2{width:180px;height:180px;bottom:10%;right:8%;animation-duration:16s}
.c3{width:80px;height:80px;top:20%;right:20%;animation-duration:10s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}
@keyframes move{from{transform:translateY(0) rotate(0)}to{transform:translateY(-40px) rotate(360deg)}}
</style>
</head>
<body>
<div class="hero">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>

  <div class="card">
    <h1>Hello, I'm Daanya 👋</h1>
    <h2>Secondary 3 Student</h2>
    <p>I am currently studying <b>Mobile Web Application</b>.</p>
    <p>I enjoy creating simple and creative webpages using <b>HTML</b> and <b>CSS</b>.</p>
    <p>Every project helps me learn new skills and improve my design ideas.</p>
    <div class="tag">Re-ignite our community lah! 🔥</div>
  </div>
</div>
</body>
</html>
