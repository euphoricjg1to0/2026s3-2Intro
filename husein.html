<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Husein | Landing Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #4facfe, #00f2fe);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      color: white;
      text-align: center;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      animation: slideDown 1.5s ease;
    }

    p {
      font-size: 1.2rem;
      margin: 8px 0;
      animation: fadeIn 2s ease;
    }

    .highlight {
      color: yellow;
      font-weight: bold;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: white;
      color: #333;
      cursor: pointer;
      border-radius: 25px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: yellow;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Hi, I'm Husein 👋</h1>
    <p>A Secondary 3 student</p>
    <p>Currently studying <span class="highlight">Mobile Web Applications</span></p>
    <p>I create simple webpages using HTML & CSS</p>
    <p>My Ignite Challenge: <span class="highlight">X-bot Extra</span></p>

    <button class="btn" onclick="showMessage()">Click Me</button>
  </div>

  <script>
    function showMessage() {
      alert("Welcome to my landing page!");
    }
  </script>

</body>
</html>
